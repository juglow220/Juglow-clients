// ─── RENDER ENGINE ───────────────────────────────────────────────
function render(html) {
  document.getElementById('view').innerHTML = html;
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

// ─── FIELD RENDERER ──────────────────────────────────────────────
function renderField(field) {
  const val = state.formData[field.id] || (field.type === 'multicheck' ? [] : '');
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const lbl = document.createElement('label');
  lbl.textContent = field.label;
  wrap.appendChild(lbl);

  if (field.type === 'select') {
    const sel = document.createElement('select');
    sel.className = 'input';
    sel.innerHTML = `<option value="">Select…</option>` + field.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
    sel.onchange = e => {
      state.formData[field.id] = e.target.value;
      if (field.trigger) { state.detectedConcern = e.target.value; renderView(); }
    };
    wrap.appendChild(sel);
  } else if (field.type === 'text') {
    const inp = document.createElement('input');
    inp.className = 'input'; inp.type = 'text';
    inp.value = val; inp.placeholder = field.placeholder || '';
    inp.oninput = e => state.formData[field.id] = e.target.value;
    wrap.appendChild(inp);
  } else if (field.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.className = 'input'; ta.value = val;
    ta.placeholder = field.placeholder || '';
    ta.oninput = e => state.formData[field.id] = e.target.value;
    wrap.appendChild(ta);
  } else if (field.type === 'radio') {
    const grp = document.createElement('div');
    grp.className = 'pill-group';
    field.options.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'btn-pill' + (val === o ? ' active' : '');
      btn.textContent = o;
      btn.onclick = () => { state.formData[field.id] = o; renderView(); };
      grp.appendChild(btn);
    });
    wrap.appendChild(grp);
  } else if (field.type === 'multicheck') {
    const grp = document.createElement('div');
    grp.className = 'pill-group';
    field.options.forEach(o => {
      const checked = val.includes(o);
      const btn = document.createElement('button');
      btn.className = 'btn-pill' + (checked ? ' active' : '');
      btn.textContent = o;
      btn.onclick = () => {
        const cur = state.formData[field.id] || [];
        state.formData[field.id] = checked ? cur.filter(x => x !== o) : [...cur, o];
        renderView();
      };
      grp.appendChild(btn);
    });
    wrap.appendChild(grp);
  }
  return wrap;
}

// ─── VIEWS ───────────────────────────────────────────────────────
async function showClients() {
  state.view = 'clients';
  render(`<div class="loading"><div class="spinner"></div> Loading clients…</div>`);
  const { data, error } = await db.from('clients').select('*').order('name');
  if (error) { render(`<div class="empty">Error loading clients</div>`); return; }
  state.clients = data || [];
  renderView();
}

function renderView() {
  const view = document.getElementById('view');
  view.innerHTML = '';

  if (state.view === 'clients') {
    renderClientList(view);
  } else if (state.view === 'newclient') {
    renderNewClient(view);
  } else if (state.view === 'client') {
    renderClientDetail(view);
  } else if (state.view === 'form') {
    renderForm(view);
  } else if (state.view === 'notes') {
    renderNotes(view);
  } else if (state.view === 'consent') {
    renderConsent(view);
  }
}

function renderClientList(view) {
  const section = document.createElement('div');
  section.className = 'section';

  // Header row
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:20px;font-weight:700">Clients</div><div style="font-size:13px;color:#9a6a6a">${state.clients.length} total</div>`;
  const newBtn = document.createElement('button');
  newBtn.className = 'btn-primary'; newBtn.textContent = '+ New Client';
  newBtn.onclick = () => { state.view = 'newclient'; renderView(); };
  hdr.appendChild(title); hdr.appendChild(newBtn);
  section.appendChild(hdr);

  // Search
  const search = document.createElement('input');
  search.className = 'input'; search.placeholder = 'Search clients…';
  search.style.marginBottom = '14px';
  search.oninput = e => {
    const q = e.target.value.toLowerCase();
    listWrap.innerHTML = '';
    renderClientCards(state.clients.filter(c => c.name.toLowerCase().includes(q)), listWrap);
  };
  section.appendChild(search);

  const listWrap = document.createElement('div');
  renderClientCards(state.clients, listWrap);
  section.appendChild(listWrap);
  view.appendChild(section);
}

function renderClientCards(clients, wrap) {
  if (clients.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty'; empty.textContent = 'No clients found';
    wrap.appendChild(empty); return;
  }
  clients.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card card-row';
    card.innerHTML = `
      <div class="avatar">${c.avatar || '??'}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${c.name}</div>
        <div style="font-size:12px;color:#9a6a6a;margin-top:2px">${c.phone || ''} · Last visit ${c.last_visit || '—'}</div>
      </div>
      <span class="tag">${c.visits || 0} visit${(c.visits||0) !== 1 ? 's' : ''}</span>
    `;
    card.onclick = () => { state.selectedClient = c; loadClientDetail(); };
    wrap.appendChild(card);
  });
}

async function loadClientDetail() {
  state.view = 'client';
  render(`<div class="loading"><div class="spinner"></div> Loading…</div>`);
  const cid = state.selectedClient.id;
  const [fr, nr, cr] = await Promise.all([
    db.from('forms').select('*').eq('client_id', cid),
    db.from('visit_notes').select('*').eq('client_id', cid).order('created_at', { ascending: false }),
    db.from('consents').select('*').eq('client_id', cid).order('created_at', { ascending: false })
  ]);
  state.savedForms = {};
  (fr.data || []).forEach(f => state.savedForms[f.service] = f);
  state.savedNotes = nr.data || [];
  state.savedConsents = cr.data || [];
  renderView();
}

  section.appendChild(title);

  svc.base.forEach(f => section.appendChild(renderField(f)));

  const conditionals = svc.conditional && state.detectedConcern ? (svc.conditional[state.detectedConcern] || []) : [];
  if (conditionals.length > 0) {
    const box = document.createElement('div');
    box.className = 'conditional-box';
    const lbl = document.createElement('div');
    lbl.className = 'conditional-label';
    lbl.textContent = `🎯 ${state.detectedConcern} — deeper questions`;
    box.appendChild(lbl);
    conditionals.forEach(f => box.appendChild(renderField(f)));
    section.appendChild(box);
  }

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full'; saveBtn.textContent = 'Save Form';
  saveBtn.style.marginTop = '8px';
  saveBtn.onclick = async () => {
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const existing = state.savedForms[state.activeService];
    let result;
    if (existing) {
      result = await db.from('forms').update({ answers: state.formData, concern: state.detectedConcern, saved_date: today }).eq('id', existing.id);
    } else {
      result = await db.from('forms').insert([{ client_id: state.selectedClient.id, service: state.activeService, answers: state.formData, concern: state.detectedConcern, saved_date: today }]);
    }
    if (result.error) { showToast('Error saving form'); return; }
    showToast('Form saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

  back.className = 'btn-back';
  back.textContent = `← ${state.selectedClient.name}`;
  back.onclick = () => { state.view = 'client'; renderView(); };
  section.appendChild(back);

  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:18px;font-weight:700;margin-bottom:2px">Visit Notes</div><div style="font-size:13px;color:#9a6a6a;margin-bottom:22px">${today}</div>`;
  section.appendChild(title);

  const noteFields = [
    { key: 'treatment', label: 'What was done', placeholder: 'Products used, techniques, machine settings…' },
    { key: 'observations', label: 'Skin observations', placeholder: 'Texture, congestion, sensitivity, improvements noticed…' },
    { key: 'products', label: 'Products recommended', placeholder: 'SPF, cleanser, serum — brand and name if possible…' },
    { key: 'followup', label: 'Follow-up / Next steps', placeholder: 'Book in 4 weeks, introduce retinol, patch test for peel…' },
  ];
  noteFields.forEach(({ key, label, placeholder }) => {
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '18px';
    wrap.innerHTML = `<label style="font-size:11px;font-weight:700;color:#9a6a6a;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px">${label}</label>`;
    const ta = document.createElement('textarea');
    ta.className = 'input'; ta.placeholder = placeholder;
    ta.value = state.noteData[key] || '';
    ta.oninput = e => state.noteData[key] = e.target.value;
    wrap.appendChild(ta); section.appendChild(wrap);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full'; saveBtn.textContent = 'Save Notes';
  saveBtn.style.marginTop = '4px';
  saveBtn.onclick = async () => {
    const todayShort = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const cid = state.selectedClient.id;
    const newVisits = (state.selectedClient.visits || 0) + 1;

    const [nr, ur] = await Promise.all([
      db.from('visit_notes').insert([{ client_id: cid, ...state.noteData, note_date: todayShort }]),
      db.from('clients').update({ visits: newVisits, last_visit: todayShort }).eq('id', cid)
    ]);
    if (nr.error || ur.error) { showToast('Error saving notes'); return; }
    state.selectedClient.visits = newVisits;
    state.selectedClient.last_visit = todayShort;
    state.clients = state.clients.map(c => c.id === cid ? { ...c, visits: newVisits, last_visit: todayShort } : c);
    showToast('Notes saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

// ─── RENDER CONSENT ──────────────────────────────────────────────
function renderConsent(view) {
  const key = state.activeConsentService;
  const form = CONSENT_FORMS[key];
  const section = document.createElement('div');
  section.className = 'section';

  const back = document.createElement('button');
  back.className = 'btn-back';
  back.textContent = `← ${state.selectedClient.name}`;
  back.onclick = () => { state.view = 'client'; renderView(); };
  section.appendChild(back);

  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:18px;font-weight:700;margin-bottom:4px">${form.emoji} ${form.label}</div><div style="font-size:13px;color:#9a6a6a;margin-bottom:8px">${state.selectedClient.name}</div><div style="font-size:13px;color:#7a4a4a;margin-bottom:20px">${form.intro}</div>`;
  section.appendChild(title);

  // Consent items as a numbered read-through list
  const itemsList = document.createElement('ol');
  itemsList.style.cssText = 'padding-left:18px;margin-bottom:20px';
  form.items.forEach(item => {
    const li = document.createElement('li');
    li.style.cssText = 'font-size:13px;color:#3d2020;line-height:1.6;margin-bottom:10px';
    li.textContent = item;
    itemsList.appendChild(li);
  });
  section.appendChild(itemsList);

  // Single acknowledgment checkbox
  let agreed = false;
  const agreeLabel = document.createElement('label');
  agreeLabel.className = 'consent-checkbox-item';
  agreeLabel.style.cssText = 'background:#fbece6;border:1.5px solid #f2e0d8;border-radius:12px;padding:14px;margin-bottom:20px';
  const agreeCb = document.createElement('input');
  agreeCb.type = 'checkbox';
  agreeCb.onchange = e => { agreed = e.target.checked; };
  const agreeSpan = document.createElement('span');
  agreeSpan.style.fontWeight = '600';
  agreeSpan.textContent = 'I have read and understand all of the above, and I consent to the treatment.';
  agreeLabel.appendChild(agreeCb);
  agreeLabel.appendChild(agreeSpan);
  section.appendChild(agreeLabel);

  // Signature
  const sigLabel = document.createElement('div');
  sigLabel.innerHTML = '<label style="font-size:11px;font-weight:700;color:#9a6a6a;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px">Client Signature</label>';
  section.appendChild(sigLabel);

  const canvasWrap = document.createElement('div');
  canvasWrap.className = 'signature-canvas-wrap';
  const canvas = document.createElement('canvas');
  canvas.className = 'signature-canvas';
  canvas.height = 160;
  canvasWrap.appendChild(canvas);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'signature-clear-btn';
  clearBtn.textContent = 'Clear';
  canvasWrap.appendChild(clearBtn);
  section.appendChild(canvasWrap);

  // Set canvas width after appending
  requestAnimationFrame(() => {
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#3d2020';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false;
    let lastX = 0, lastY = 0;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return [src.clientX - rect.left, src.clientY - rect.top];
    }
    function startDraw(e) { e.preventDefault(); drawing = true; [lastX, lastY] = getPos(e); }
    function draw(e) {
      if (!drawing) return; e.preventDefault();
      const [x, y] = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
      [lastX, lastY] = [x, y];
    }
    function endDraw() { drawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    clearBtn.onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // Date/time display
  const dateWrap = document.createElement('div');
  dateWrap.style.cssText = 'margin-top:14px;font-size:13px;color:#9a6a6a';
  const now = new Date();
  dateWrap.textContent = `Date: ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
  section.appendChild(dateWrap);

  // Save button
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full';
  saveBtn.textContent = 'Save Signed Consent';
  saveBtn.style.marginTop = '20px';
  saveBtn.onclick = async () => {
    if (!agreed) { showToast('Please check the acknowledgment box'); return; }
    const isEmpty = canvas.toDataURL() === document.createElement('canvas').toDataURL();
    if (isEmpty) { showToast('Please add a signature'); return; }
    const sigData = canvas.toDataURL('image/png');
    const signedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const { error } = await db.from('consents').insert([{
      client_id: state.selectedClient.id,
      service: key,
      checkboxes: { agreed: true },
      signature: sigData,
      signed_at: signedAt,
    }]);
    if (error) { showToast('Error saving consent'); return; }
    showToast('Consent saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

// ─── PASSWORD ────────────────────────────────────────────────────
const PASS = 'Juhijuhi2930!';
const SESSION_KEY = 'jg_auth';

function checkAuth() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

function initLock() {
  if (checkAuth()) {
    document.getElementById('lockScreen').classList.add('hidden');
    showClients();
    return;
  }
  const input = document.getElementById('lockInput');
  const btn = document.getElementById('lockBtn');
  const err = document.getElementById('lockError');

  function tryUnlock() {
    if (input.value === PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lockScreen').classList.add('hidden');
      showClients();
    } else {
      err.textContent = 'Incorrect password. Try again.';
      input.value = '';
      input.focus();
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  btn.onclick = tryUnlock;
  input.onkeydown = e => { if (e.key === 'Enter') tryUnlock(); };
  input.focus();
}

// ─── INIT ────────────────────────────────────────────────────────
initLock();
</script>
