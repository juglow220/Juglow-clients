// ─── EXPENSE CONSTANTS ───────────────────────────────────────────
const CATEGORIES = ['Supplies','Equipment','Furniture','Education','Marketing','Registration','Software/Subscriptions','Phone/Utilities','Other'];

const VENDOR_RULES = [
  { pattern: /claude|anthropic/i, category: 'Software/Subscriptions' },
  { pattern: /tello/i, category: 'Phone/Utilities' },
  { pattern: /at&t|att\b/i, category: 'Phone/Utilities' },
  { pattern: /hobby lobby/i, category: 'Supplies' },
  { pattern: /michaels/i, category: 'Supplies' },
  { pattern: /skin script/i, category: 'Supplies' },
  { pattern: /five below/i, category: 'Supplies' },
  { pattern: /staples/i, category: 'Supplies' },
  { pattern: /wayfair/i, category: 'Furniture' },
];

const ALWAYS_ASK_VENDORS = [/amazon/i, /target/i, /temu/i, /walmart/i, /canva/i];

function guessCategory(str) {
  for (const rule of VENDOR_RULES) {
    if (rule.pattern.test(str)) return rule.category;
  }
  return null;
}

function isAlwaysAsk(str) {
  return ALWAYS_ASK_VENDORS.some(p => p.test(str));
}

function formatMonth(ym) {
  const [y, m] = ym.split('-');
  return new Date(y, m - 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function toTitleCase(str) {
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQuotes = !inQuotes; }
    else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += line[i]; }
  }
  result.push(current);
  return result;
}

function parseAnyCSV(text) {
  const clean = text.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = clean.trim().split('\n');
  const header = parseCSVLine(lines[0]).map(h => h.trim().replace(/"/g, '').toLowerCase());
  // Auto-detect format by headers
  if (header.includes('vendor') || header.includes('payment')) {
    return parseSpreadsheetCSV(lines, header);
  }
  return parseChaseCSV(text);
}

function parseSpreadsheetCSV(lines, header) {
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (cols.length < 2) continue;
    const row = {};
    header.forEach((h, idx) => { row[h] = (cols[idx] || '').replace(/"/g, '').trim(); });

    const dateRaw = row['date'] || '';
    const vendor = row['vendor'] || '';
    const description = row['description'] || '';
    const amtStr = (row['amount'] || '0').replace(/[$,]/g, '');
    const amount = parseFloat(amtStr);
    const category = row['category'] || '';
    const payment = row['payment'] || '';
    const notes = row['notes'] || '';

    if (!vendor || isNaN(amount) || amount <= 0) continue;

    // Convert MM/DD/YY or MM/DD/YYYY to YYYY-MM-DD
    const dp = dateRaw.split('/');
    let date = dateRaw;
    if (dp.length === 3) {
      const yr = dp[2].length === 2 ? '20' + dp[2] : dp[2];
      date = `${yr}-${dp[0].padStart(2,'0')}-${dp[1].padStart(2,'0')}`;
    }

    // Map category to our standard list (case-insensitive fuzzy match)
    const catMatch = CATEGORIES.find(c => c.toLowerCase() === category.toLowerCase())
      || CATEGORIES.find(c => category.toLowerCase().includes(c.toLowerCase().split('/')[0].toLowerCase()))
      || '';

    rows.push({
      _date: date,
      _vendor: vendor,
      _desc: description,
      _amount: amount,
      _category: catMatch,
      _payment: payment,
      _notes: notes,
    });
  }
  return rows;
}

function parseChaseCSV(text) {
  // Strip BOM and normalize line endings
  const clean = text.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = clean.trim().split('\n');
  const header = parseCSVLine(lines[0]).map(h => h.trim().replace(/"/g, '').toLowerCase());

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (cols.length < 3) continue;
    const row = {};
    header.forEach((h, idx) => { row[h] = (cols[idx] || '').replace(/"/g, '').trim(); });

    const dateRaw = row['transaction date'] || row['posting date'] || row['date'] || '';
    const desc = row['description'] || row['merchant name'] || row['name'] || '';
    const amtStr = row['amount'] || row['debit'] || '0';
    const amtRaw = parseFloat(amtStr.replace(/[$,]/g, ''));
    const typeCol = (row['type'] || row['transaction type'] || '').toLowerCase();

    // Chase: purchases = negative amount, OR type contains "sale"/"debit"
    const isDebit = (!isNaN(amtRaw) && amtRaw < 0) ||
                    (typeCol && (typeCol.includes('sale') || typeCol.includes('debit')));
    if (!isDebit || isNaN(amtRaw)) continue;

    const dp = dateRaw.split('/');
    const date = dp.length === 3
      ? `${dp[2]}-${dp[0].padStart(2,'0')}-${dp[1].padStart(2,'0')}`
      : dateRaw;
    const vendor = toTitleCase(desc.replace(/#\d+/g, '').replace(/\s+/g, ' ').trim());
    const amount = Math.abs(amtRaw);
    const autocat = guessCategory(vendor) || guessCategory(desc);
    const askCat = isAlwaysAsk(vendor) || isAlwaysAsk(desc);
    rows.push({ _date: date, _vendor: vendor, _desc: desc, _amount: amount, _category: (autocat && !askCat) ? autocat : '' });
  }
  return rows;
}

// ─── RENDER ENGINE ───────────────────────────────────────────────
function render(html) {
  document.getElementById('view').innerHTML = html;
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

// ─── FIELD RENDERER ──────────────────────────────────────────────
function renderField(field) {
  const val = state.formData[field.id] || (field.type === 'multicheck' ? [] : '');
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const lbl = document.createElement('label');
  lbl.textContent = field.label;
  wrap.appendChild(lbl);

  if (field.type === 'select') {
    const sel = document.createElement('select');
    sel.className = 'input';
    sel.innerHTML = `<option value="">Select…</option>` + field.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
    sel.onchange = e => {
      state.formData[field.id] = e.target.value;
      if (field.trigger) { state.detectedConcern = e.target.value; renderView(); }
    };
    wrap.appendChild(sel);
  } else if (field.type === 'text') {
    const inp = document.createElement('input');
    inp.className = 'input'; inp.type = 'text';
    inp.value = val; inp.placeholder = field.placeholder || '';
    inp.oninput = e => state.formData[field.id] = e.target.value;
    wrap.appendChild(inp);
  } else if (field.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.className = 'input'; ta.value = val;
    ta.placeholder = field.placeholder || '';
    ta.oninput = e => state.formData[field.id] = e.target.value;
    wrap.appendChild(ta);
  } else if (field.type === 'radio') {
    const grp = document.createElement('div');
    grp.className = 'pill-group';
    field.options.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'btn-pill' + (val === o ? ' active' : '');
      btn.textContent = o;
      btn.onclick = () => { state.formData[field.id] = o; renderView(); };
      grp.appendChild(btn);
    });
    wrap.appendChild(grp);
  } else if (field.type === 'multicheck') {
    const grp = document.createElement('div');
    grp.className = 'pill-group';
    field.options.forEach(o => {
      const checked = val.includes(o);
      const btn = document.createElement('button');
      btn.className = 'btn-pill' + (checked ? ' active' : '');
      btn.textContent = o;
      btn.onclick = () => {
        const cur = state.formData[field.id] || [];
        state.formData[field.id] = checked ? cur.filter(x => x !== o) : [...cur, o];
        renderView();
      };
      grp.appendChild(btn);
    });
    wrap.appendChild(grp);
  }
  return wrap;
}

async function showClients() {
  state.view = 'clients';
  render(`<div class="loading"><div class="spinner"></div> Loading clients…</div>`);
  const { data, error } = await db.from('clients').select('*').order('name');
  if (error) { render(`<div class="empty">Error loading clients</div>`); return; }
  state.clients = data || [];
  renderView();
}

function renderView() {
  const view = document.getElementById('view');
  view.innerHTML = '';
  updateNav();
  const isWide = ['expenses','importCSV'].includes(state.view);
  document.getElementById('app').classList.toggle('wide', isWide);

  if (state.view === 'clients') {
    renderClientList(view);
  } else if (state.view === 'newclient') {
    renderNewClient(view);
  } else if (state.view === 'client') {
    renderClientDetail(view);
  } else if (state.view === 'form') {
    renderForm(view);
  } else if (state.view === 'notes') {
    renderNotes(view);
  } else if (state.view === 'consent') {
    renderConsent(view);
  } else if (state.view === 'expenses') {
    renderExpenses(view);
  } else if (state.view === 'addExpense') {
    renderAddExpense(view);
  } else if (state.view === 'importCSV') {
    renderImportCSV(view);
  } else if (state.view === 'lists') {
    renderLists(view);
  }
}

function renderClientList(view) {
  const section = document.createElement('div');
  section.className = 'section';

  // Header row
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:20px;font-weight:700">Clients</div><div style="font-size:13px;color:#9a6a6a">${state.clients.length} total</div>`;
  const newBtn = document.createElement('button');
  newBtn.className = 'btn-primary'; newBtn.textContent = '+ New Client';
  newBtn.onclick = () => { state.view = 'newclient'; renderView(); };
  hdr.appendChild(title); hdr.appendChild(newBtn);
  section.appendChild(hdr);

  // Search
  const search = document.createElement('input');
  search.className = 'input'; search.placeholder = 'Search clients…';
  search.style.marginBottom = '14px';
  search.oninput = e => {
    const q = e.target.value.toLowerCase();
    listWrap.innerHTML = '';
    renderClientCards(state.clients.filter(c => c.name.toLowerCase().includes(q)), listWrap);
  };
  section.appendChild(search);

  const listWrap = document.createElement('div');
  renderClientCards(state.clients, listWrap);
  section.appendChild(listWrap);
  view.appendChild(section);
}

function renderClientCards(clients, wrap) {
  if (clients.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty'; empty.textContent = 'No clients found';
    wrap.appendChild(empty); return;
  }
  clients.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card card-row';
    card.innerHTML = `
      <div class="avatar">${c.avatar || '??'}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${c.name}</div>
        <div style="font-size:12px;color:#9a6a6a;margin-top:2px">${c.phone || ''} · Last visit ${c.last_visit || '—'}</div>
      </div>
      <span class="tag">${c.visits || 0} visit${(c.visits||0) !== 1 ? 's' : ''}</span>
    `;
    card.onclick = () => { state.selectedClient = c; loadClientDetail(); };
    wrap.appendChild(card);
  });
}

async function loadClientDetail() {
  state.view = 'client';
  render(`<div class="loading"><div class="spinner"></div> Loading…</div>`);
  const cid = state.selectedClient.id;
  const [fr, nr, cr] = await Promise.all([
    db.from('forms').select('*').eq('client_id', cid),
    db.from('visit_notes').select('*').eq('client_id', cid).order('created_at', { ascending: false }),
    db.from('consents').select('*').eq('client_id', cid).order('created_at', { ascending: false })
  ]);
  state.savedForms = {};
  (fr.data || []).forEach(f => state.savedForms[f.service] = f);
  state.savedNotes = nr.data || [];
  state.savedConsents = cr.data || [];
  renderView();
}

function renderForm(view) {
  const svc = SERVICES[state.activeService];
  const section = document.createElement('div');
  section.className = 'section';

  const back = document.createElement('button');
  back.className = 'btn-back';
  back.textContent = `← ${state.selectedClient.name}`;
  back.onclick = () => { state.view = 'client'; renderView(); };
  section.appendChild(back);

  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:18px;font-weight:700;margin-bottom:2px">${svc.emoji} ${svc.label}</div><div style="font-size:13px;color:#9a6a6a;margin-bottom:22px">Intake & Consultation</div>`;
  section.appendChild(title);

  svc.base.forEach(f => section.appendChild(renderField(f)));

  const conditionals = svc.conditional && state.detectedConcern ? (svc.conditional[state.detectedConcern] || []) : [];
  if (conditionals.length > 0) {
    const box = document.createElement('div');
    box.className = 'conditional-box';
    const lbl = document.createElement('div');
    lbl.className = 'conditional-label';
    lbl.textContent = `🎯 ${state.detectedConcern} — deeper questions`;
    box.appendChild(lbl);
    conditionals.forEach(f => box.appendChild(renderField(f)));
    section.appendChild(box);
  }

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full'; saveBtn.textContent = 'Save Form';
  saveBtn.style.marginTop = '8px';
  saveBtn.onclick = async () => {
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const existing = state.savedForms[state.activeService];
    let result;
    if (existing) {
      result = await db.from('forms').update({ answers: state.formData, concern: state.detectedConcern, saved_date: today }).eq('id', existing.id);
    } else {
      result = await db.from('forms').insert([{ client_id: state.selectedClient.id, service: state.activeService, answers: state.formData, concern: state.detectedConcern, saved_date: today }]);
    }
    if (result.error) { showToast('Error saving form'); return; }
    showToast('Form saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

function renderNotes(view) {
  if (!state.noteData) state.noteData = { treatment: '', products: '', observations: '', followup: '' };
  const section = document.createElement('div');
  section.className = 'section';

  const back = document.createElement('button');
  back.className = 'btn-back';
  back.textContent = `← ${state.selectedClient.name}`;
  back.onclick = () => { state.view = 'client'; renderView(); };
  section.appendChild(back);

  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const title = document.createElement('div');
  title.innerHTML = `<div style="font-size:18px;font-weight:700;margin-bottom:2px">Visit Notes</div><div style="font-size:13px;color:#9a6a6a;margin-bottom:22px">${today}</div>`;
  section.appendChild(title);

  const noteFields = [
    { key: 'treatment', label: 'What was done', placeholder: 'Products used, techniques, machine settings…' },
    { key: 'observations', label: 'Skin observations', placeholder: 'Texture, congestion, sensitivity, improvements noticed…' },
    { key: 'products', label: 'Products recommended', placeholder: 'SPF, cleanser, serum — brand and name if possible…' },
    { key: 'followup', label: 'Follow-up / Next steps', placeholder: 'Book in 4 weeks, introduce retinol, patch test for peel…' },
  ];
  noteFields.forEach(({ key, label, placeholder }) => {
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '18px';
    wrap.innerHTML = `<label style="font-size:11px;font-weight:700;color:#9a6a6a;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px">${label}</label>`;
    const ta = document.createElement('textarea');
    ta.className = 'input'; ta.placeholder = placeholder;
    ta.value = state.noteData[key] || '';
    ta.oninput = e => state.noteData[key] = e.target.value;
    wrap.appendChild(ta); section.appendChild(wrap);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full'; saveBtn.textContent = 'Save Notes';
  saveBtn.style.marginTop = '4px';
  saveBtn.onclick = async () => {
    const todayShort = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const cid = state.selectedClient.id;
    const newVisits = (state.selectedClient.visits || 0) + 1;

    const [nr, ur] = await Promise.all([
      db.from('visit_notes').insert([{ client_id: cid, ...state.noteData, note_date: todayShort }]),
      db.from('clients').update({ visits: newVisits, last_visit: todayShort }).eq('id', cid)
    ]);
    if (nr.error || ur.error) { showToast('Error saving notes'); return; }
    state.selectedClient.visits = newVisits;
    state.selectedClient.last_visit = todayShort;
    state.clients = state.clients.map(c => c.id === cid ? { ...c, visits: newVisits, last_visit: todayShort } : c);
    showToast('Notes saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

function renderConsent(view) {
  const key = state.activeConsentService;
  const form = CONSENT_FORMS[key];

  section.appendChild(title);

  // Consent items as a numbered read-through list
  const itemsList = document.createElement('ol');
  itemsList.style.cssText = 'padding-left:18px;margin-bottom:20px';
  form.items.forEach(item => {
    const li = document.createElement('li');
    li.style.cssText = 'font-size:13px;color:#3d2020;line-height:1.6;margin-bottom:10px';
    li.textContent = item;
    itemsList.appendChild(li);
  });
  section.appendChild(itemsList);

  // Single acknowledgment checkbox
  let agreed = false;
  const agreeLabel = document.createElement('label');
  agreeLabel.className = 'consent-checkbox-item';
  agreeLabel.style.cssText = 'background:#fbece6;border:1.5px solid #f2e0d8;border-radius:12px;padding:14px;margin-bottom:20px';
  const agreeCb = document.createElement('input');
  agreeCb.type = 'checkbox';
  agreeCb.onchange = e => { agreed = e.target.checked; };
  const agreeSpan = document.createElement('span');
  agreeSpan.style.fontWeight = '600';
  agreeSpan.textContent = 'I have read and understand all of the above, and I consent to the treatment.';
  agreeLabel.appendChild(agreeCb);
  agreeLabel.appendChild(agreeSpan);
  section.appendChild(agreeLabel);

  // Signature
  const sigLabel = document.createElement('div');
  sigLabel.innerHTML = '<label style="font-size:11px;font-weight:700;color:#9a6a6a;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px">Client Signature</label>';
  section.appendChild(sigLabel);

  const canvasWrap = document.createElement('div');
  canvasWrap.className = 'signature-canvas-wrap';
  const canvas = document.createElement('canvas');
  canvas.className = 'signature-canvas';
  canvas.height = 160;
  canvasWrap.appendChild(canvas);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'signature-clear-btn';
  clearBtn.textContent = 'Clear';
  canvasWrap.appendChild(clearBtn);
  section.appendChild(canvasWrap);

  // Set canvas width after appending
  requestAnimationFrame(() => {
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#3d2020';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false;
    let lastX = 0, lastY = 0;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return [src.clientX - rect.left, src.clientY - rect.top];
    }
    function startDraw(e) { e.preventDefault(); drawing = true; [lastX, lastY] = getPos(e); }
    function draw(e) {
      if (!drawing) return; e.preventDefault();
      const [x, y] = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
      [lastX, lastY] = [x, y];
    }
    function endDraw() { drawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    clearBtn.onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // Date/time display
  const dateWrap = document.createElement('div');
  dateWrap.style.cssText = 'margin-top:14px;font-size:13px;color:#9a6a6a';
  const now = new Date();
  dateWrap.textContent = `Date: ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
  section.appendChild(dateWrap);

  // Save button
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full';
  saveBtn.textContent = 'Save Signed Consent';
  saveBtn.style.marginTop = '20px';
  saveBtn.onclick = async () => {
    if (!agreed) { showToast('Please check the acknowledgment box'); return; }
    const isEmpty = canvas.toDataURL() === document.createElement('canvas').toDataURL();
    if (isEmpty) { showToast('Please add a signature'); return; }
    const sigData = canvas.toDataURL('image/png');
    const signedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const { error } = await db.from('consents').insert([{
      client_id: state.selectedClient.id,
      service: key,
      checkboxes: { agreed: true },
      signature: sigData,
      signed_at: signedAt,
    }]);
    if (error) { showToast('Error saving consent'); return; }
    showToast('Consent saved ✓');
    await loadClientDetail();
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

// ─── EXPENSES ────────────────────────────────────────────────────
async function showExpenses() {
  state.view = 'expenses';
  updateNav();
  render(`<div class="loading"><div class="spinner"></div> Loading expenses…</div>`);
  let from, to;
  if (state.expenseViewMode === 'year') {
    from = `${state.expenseYear}-01-01`;
    to = `${state.expenseYear}-12-31`;
  } else {
    const [yr, mo] = state.expenseMonth.split('-');
    const lastDay = new Date(parseInt(yr), parseInt(mo), 0).getDate();
    from = `${state.expenseMonth}-01`;
    to = `${state.expenseMonth}-${String(lastDay).padStart(2,'0')}`;
  }
  const { data, error } = await db.from('expenses').select('*').gte('date', from).lte('date', to).order('date', { ascending: false });
  if (error) { showToast('Error loading: ' + error.message); state.expenses = []; }
  else state.expenses = data || [];
  renderView();
}

  section.appendChild(pmWrap);

  // Receipt
  const receiptWrap = document.createElement('div');
  receiptWrap.className = 'field';
  const receiptLbl = document.createElement('label');
  receiptLbl.innerHTML = 'Receipt';
  const reqNote = document.createElement('span');
  reqNote.id = 'receiptReqNote';
  reqNote.style.cssText = 'display:none;margin-left:8px;font-size:10px;background:#fde8e8;color:#c0392b;padding:2px 8px;border-radius:20px;font-weight:600';
  reqNote.textContent = 'Required for amounts over $50';
  receiptLbl.appendChild(reqNote);
  receiptWrap.appendChild(receiptLbl);
  const fileInp = document.createElement('input');
  fileInp.type = 'file'; fileInp.accept = 'image/*,.pdf'; fileInp.className = 'input';
  fileInp.style.padding = '8px';
  fileInp.onchange = e => ef._receiptFile = e.target.files[0];
  receiptWrap.appendChild(fileInp);
  if (ef.receipt_url) {
    const existingLink = document.createElement('div');
    existingLink.style.cssText = 'margin-top:6px;font-size:12px;color:#7a4a4a';
    existingLink.innerHTML = `<a href="${ef.receipt_url}" target="_blank" style="color:#7a4a4a;font-weight:600;text-decoration:none">📎 Current receipt</a> — upload a new file to replace`;
    receiptWrap.appendChild(existingLink);
  }
  section.appendChild(receiptWrap);

  function updateReceiptNote() {
    const n = document.getElementById('receiptReqNote');
    if (n) n.style.display = parseFloat(ef.amount) > 50 ? 'inline' : 'none';
  }
  updateReceiptNote();

  // Notes
  section.appendChild(makeField('Notes (optional)', () => {
    const ta = document.createElement('textarea');
    ta.className = 'input'; ta.style.minHeight = '60px';
    ta.value = ef.notes || ''; ta.placeholder = 'Any additional notes…';
    ta.oninput = e => ef.notes = e.target.value;
    return ta;
  }));

  // Save
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full';
  saveBtn.textContent = ef.id ? 'Update Expense' : 'Save Expense';
  saveBtn.style.marginTop = '8px';
  saveBtn.onclick = async () => {
    if (!ef.date) { showToast('Date is required'); return; }
    if (!ef.vendor || !ef.vendor.trim()) { showToast('Vendor is required'); return; }
    if (!ef.category) { showToast('Category is required'); return; }
    if (!ef.amount || isNaN(parseFloat(ef.amount))) { showToast('Amount is required'); return; }
    if (parseFloat(ef.amount) > 50 && !ef._receiptFile && !ef.receipt_url) { showToast('Receipt required for amounts over $50'); return; }
    saveBtn.textContent = 'Saving…'; saveBtn.disabled = true;
    try {
      let receipt_url = ef.receipt_url || null;
      if (ef._receiptFile) {
        const ext = ef._receiptFile.name.split('.').pop();
        const path = `${Date.now()}_${ef.vendor.replace(/\W+/g,'_').toLowerCase()}.${ext}`;
        const { error: upErr } = await db.storage.from('receipts').upload(path, ef._receiptFile);
        if (upErr) throw upErr;
        const { data: urlData } = db.storage.from('receipts').getPublicUrl(path);
        receipt_url = urlData.publicUrl;
      }
      const payload = {
        date: ef.date, vendor: ef.vendor.trim(),
        description: ef.description || '', category: ef.category,
        amount: parseFloat(ef.amount), payment_method: ef.payment_method || '',
        receipt_url, notes: ef.notes || '',
      };
      const { error } = ef.id
        ? await db.from('expenses').update(payload).eq('id', ef.id)
        : await db.from('expenses').insert([payload]);
      if (error) throw error;
      showToast(ef.id ? 'Expense updated ✓' : 'Expense saved ✓');
      await showExpenses();
    } catch (err) {
      showToast('Error: ' + (err.message || err.error_description || JSON.stringify(err)));
      saveBtn.textContent = ef.id ? 'Update Expense' : 'Save Expense';
      saveBtn.disabled = false;
    }
  };
  section.appendChild(saveBtn);
  view.appendChild(section);
}

function renderImportCSV(view) {
  const section = document.createElement('div');
  section.className = 'section';

  const back = document.createElement('button');
  back.className = 'btn-back'; back.textContent = '← Expenses';
  back.onclick = () => { state.view = 'expenses'; renderView(); };
  section.appendChild(back);

  const titleDiv = document.createElement('div');
  titleDiv.innerHTML = `<div style="font-size:18px;font-weight:700;margin-bottom:4px">Import Expenses</div><div style="font-size:13px;color:#9a6a6a;margin-bottom:20px">Upload a CSV — works with Chase transaction exports or your Google Sheets export (File → Download → CSV). Vendor rules auto-apply; any uncategorized rows need a category before saving.</div>`;
  section.appendChild(titleDiv);

  if (!state.importRows || state.importRows.length === 0) {
    const dropZone = document.createElement('div');
    dropZone.className = 'import-drop';
    const fileInp = document.createElement('input');
    fileInp.type = 'file'; fileInp.accept = '.csv,.txt,.tsv,text/csv,text/plain,application/vnd.ms-excel'; fileInp.style.display = 'none';
    fileInp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const rows = parseAnyCSV(ev.target.result);
          if (rows.length === 0) { showToast('No purchase transactions found in this file — check it\'s a CSV export, not a PDF'); return; }
          state.importRows = rows;
          renderView();
        } catch (err) {
          showToast('Error parsing CSV: ' + (err.message || err));
        }
      };
      reader.onerror = () => showToast('Could not read that file — try re-selecting it');
      reader.readAsText(file);
    };
    const pickBtn = document.createElement('button');
    pickBtn.className = 'btn-primary'; pickBtn.textContent = 'Choose CSV File';
    pickBtn.onclick = () => fileInp.click();
    dropZone.innerHTML = `<div style="font-size:36px;margin-bottom:12px">📄</div><div style="font-weight:700;margin-bottom:6px">Choose Chase CSV file</div><div style="font-size:12px;color:#9a6a6a;margin-bottom:18px">Chase → Account Activity → Download → CSV format</div>`;
    dropZone.appendChild(fileInp);
    dropZone.appendChild(pickBtn);
    section.appendChild(dropZone);
  } else {
    renderImportReview(section);
  }
  view.appendChild(section);
}

function renderImportReview(section) {
  const rows = state.importRows;
  const needsReview = rows.filter(r => !r._category).length;
  const total = rows.reduce((s, r) => s + r._amount, 0);

  const summary = document.createElement('div');
  summary.className = 'total-bar';
  summary.style.marginBottom = '14px';
  const summaryLeft = document.createElement('div');
  summaryLeft.innerHTML = `<div style="font-weight:700">${rows.length} transactions</div>`;
  const flagNote = document.createElement('div');
  flagNote.id = 'importFlagNote';
  flagNote.style.cssText = 'font-size:12px;margin-top:4px';
  flagNote.innerHTML = needsReview > 0
    ? `<span style="color:#c0392b">⚠ ${needsReview} need a category</span>`
    : `<span style="color:#2d6a4f">All categorized ✓</span>`;
  summaryLeft.appendChild(flagNote);
  summary.appendChild(summaryLeft);
  const summaryRight = document.createElement('div');
  summaryRight.className = 'total-bar-amount';
  summaryRight.textContent = `$${total.toFixed(2)}`;
  summary.appendChild(summaryRight);
  section.appendChild(summary);

  rows.forEach((row, idx) => {
    const card = document.createElement('div');
    card.className = 'expense-card';
    if (!row._category) card.classList.add('expense-flag');

    const top = document.createElement('div');
    top.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px';
    top.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${row._vendor}</div>
        <div style="font-size:12px;color:#9a6a6a">${row._date}</div>
      </div>
      <div style="font-weight:700;font-size:15px;margin-left:14px;flex-shrink:0">$${row._amount.toFixed(2)}</div>
    `;
    card.appendChild(top);

    const sel = document.createElement('select');
    sel.className = 'input'; sel.style.fontSize = '13px';
    sel.innerHTML = `<option value="">Select category…</option>` +
      CATEGORIES.map(c => `<option value="${c}" ${row._category === c ? 'selected' : ''}>${c}</option>`).join('');
    sel.onchange = e => {
      state.importRows[idx]._category = e.target.value;
      card.classList.toggle('expense-flag', !e.target.value);
      const stillNeeds = state.importRows.filter(r => !r._category).length;
      const fn = document.getElementById('importFlagNote');
      if (fn) fn.innerHTML = stillNeeds > 0
        ? `<span style="color:#c0392b">⚠ ${stillNeeds} need a category</span>`
        : `<span style="color:#2d6a4f">All categorized ✓</span>`;
    };
    card.appendChild(sel);
    section.appendChild(card);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary btn-full'; saveBtn.style.marginTop = '12px';
  saveBtn.textContent = `Save ${rows.length} Expenses`;
  saveBtn.onclick = async () => {
    const uncategorized = rows.filter(r => !r._category);
    if (uncategorized.length > 0) { showToast(`${uncategorized.length} expense(s) still need a category`); return; }
    saveBtn.textContent = 'Saving…'; saveBtn.disabled = true;
    const payload = rows.map(r => ({
      date: r._date, vendor: r._vendor, description: r._desc || '',
      category: r._category, amount: r._amount,
      payment_method: r._payment || '', receipt_url: null, notes: r._notes || '',
    }));
    const { error } = await db.from('expenses').insert(payload);
    if (error) { showToast('Error: ' + (error.message || JSON.stringify(error))); saveBtn.textContent = `Save ${rows.length} Expenses`; saveBtn.disabled = false; return; }
    showToast(`${rows.length} expenses saved ✓`);
    state.importRows = [];
    await showExpenses();
  };
  section.appendChild(saveBtn);
}

// ─── PASSWORD ────────────────────────────────────────────────────
const PASS = 'Juhijuhi2930!';
const SESSION_KEY = 'jg_auth';

function checkAuth() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

function initLock() {
  if (checkAuth()) {
    document.getElementById('lockScreen').classList.add('hidden');
    showClients();
    return;
  }
  const input = document.getElementById('lockInput');
  const btn = document.getElementById('lockBtn');
  const err = document.getElementById('lockError');

  function tryUnlock() {
    if (input.value === PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lockScreen').classList.add('hidden');
      showClients();
    } else {
      err.textContent = 'Incorrect password. Try again.';
      input.value = '';
      input.focus();
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  btn.onclick = tryUnlock;
  input.onkeydown = e => { if (e.key === 'Enter') tryUnlock(); };
  input.focus();
}

// ─── INIT ────────────────────────────────────────────────────────
initLock();
